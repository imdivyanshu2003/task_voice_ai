<!DOCTYPE html>
<html>
<head><title>Generate Saathi Icons</title></head>
<body>
<h2>Right-click each image → "Save image as" to download</h2>
<p>Save as <b>icon-192.png</b> and <b>icon-512.png</b> in the <code>web/public/</code> folder</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.22; // corner radius
  
  // Background
  ctx.fillStyle = '#0E0B1A';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();

  // Gradient circle
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#B39DFF');
  grad.addColorStop(1, '#FFB48A');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s*0.333, 0, Math.PI*2);
  ctx.fill();

  // Star
  const cx = s/2, cy = s/2, outerR = s*0.21, innerR = s*0.1;
  ctx.fillStyle = 'white';
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 72 - 90) * Math.PI / 180;
    const innerAngle = ((i * 72) + 36 - 90) * Math.PI / 180;
    ctx.lineTo(cx + outerR * Math.cos(angle), cy + outerR * Math.sin(angle));
    ctx.lineTo(cx + innerR * Math.cos(innerAngle), cy + innerR * Math.sin(innerAngle));
  }
  ctx.closePath();
  ctx.fill();
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
