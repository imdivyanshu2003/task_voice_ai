name: saathi
description: Saathi AI — emotionally intelligent companion that also executes.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + routing
  provider: ^6.1.2
  go_router: ^14.6.1

  # Networking
  http: ^1.2.2

  # Voice (free, on-device)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  permission_handler: ^11.3.1

  # Local storage (memory + tasks)
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # UI niceties
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
